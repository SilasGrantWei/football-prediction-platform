name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    name: Node build and API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:api

  python:
    name: Python syntax and AI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r services/ai/requirements.txt
      - run: python -m compileall backend services/ai/app
      - run: python -m pytest
        working-directory: services/ai
